<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if item %}Edit Item{% else %}New Item{% endif %}</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 0 auto; padding: 16px; background: #f0f4f8; }
        h1 { color: #2c7a4b; }
        .nav a { background: #e0ebe5; color: #2c7a4b; padding: 10px 16px; border-radius: 8px; text-decoration: none; font-size: 15px; }
        .card { background: white; border-radius: 14px; padding: 20px; margin: 16px 0; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 14px; }
        label:first-child { margin-top: 0; }
        input[type=text], textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; background: #fafafa; box-sizing: border-box; }
        textarea { height: 90px; resize: vertical; }
        .active-row { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; padding: 12px; background: #f0f4f8; border-radius: 8px; }
        .active-row span { font-size: 15px; color: #444; }
        .toggle-cb { display: none; }
        .toggle-label { width: 48px; height: 26px; background: #ccc; border-radius: 13px; display: block; position: relative; cursor: pointer; transition: background 0.2s; }
        .toggle-label::after { content: ''; position: absolute; width: 20px; height: 20px; background: white; border-radius: 50%; top: 3px; left: 3px; transition: left 0.2s; }
        .toggle-cb:checked + .toggle-label { background: #2c7a4b; }
        .toggle-cb:checked + .toggle-label::after { left: 25px; }
        button[type=submit] { background: #2c7a4b; color: white; border: none; padding: 14px 20px; border-radius: 8px; font-size: 16px; width: 100%; cursor: pointer; margin-top: 20px; }
        .btn-delete { background: #fff0f0; color: #e74c3c; border: 1px solid #e74c3c; padding: 12px 20px; border-radius: 8px; font-size: 15px; width: 100%; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="nav"><a href="{{ url_for('todo.index') }}">← Back</a></div>
    <h1>{% if item %}✏️ Edit Item{% else %}➕ New Item{% endif %}</h1>

    <div class="card">
        <form method="POST">
            <label>Label</label>
            <input type="text" name="label" value="{{ item['label'] if item else '' }}" placeholder="What shows on the list" required>

            <label>Description</label>
            <textarea name="description" placeholder="Details shown on hover or tap">{{ item['description'] if item and item['description'] else '' }}</textarea>

            <label>List</label>
            <select name="list_name">
                {% for lst in lists %}
                <option value="{{ lst }}"
                    {% if item and item['list_name'] == lst %}selected
                    {% elif not item and preselect == lst %}selected{% endif %}>
                    {{ lst }}
                </option>
                {% endfor %}
            </select>

            <div class="active-row">
                <span>Active (shows on list)</span>
                <div>
                    <input type="checkbox" class="toggle-cb" id="active-toggle" name="active"
                        {% if item is none or item['active'] %}checked{% endif %}>
                    <label class="toggle-label" for="active-toggle"></label>
                </div>
            </div>

            <button type="submit">{% if item %}Save Changes{% else %}Add Item{% endif %}</button>
        </form>

        {% if item %}
        <form method="POST" action="{{ url_for('todo.delete_item', id=item['id']) }}" onsubmit="return confirm('Delete this item?')">
            <button type="submit" class="btn-delete">🗑 Delete Item</button>
        </form>
        {% endif %}
    </div>
</body>
</html>
