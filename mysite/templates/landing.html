<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bland Family Apps</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; min-height: 100vh; background: #0f0f1a; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
        h1 { color: #eee; font-size: 22px; margin-bottom: 32px; letter-spacing: 1px; text-transform: uppercase; opacity: 0.6; }
        .apps { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 420px; }
        .app-card { display: flex; align-items: center; gap: 20px; padding: 24px; border-radius: 16px; text-decoration: none; transition: transform 0.15s, box-shadow 0.15s; }
        .app-card:active { transform: scale(0.97); }
        .app-card .icon { font-size: 40px; flex-shrink: 0; }
        .app-card .info .name { font-size: 20px; font-weight: bold; color: white; }
        .app-card .info .desc { font-size: 14px; margin-top: 4px; opacity: 0.75; color: white; }
        .packing { background: linear-gradient(135deg, #c0622f, #a04820); box-shadow: 0 4px 20px rgba(192,98,47,0.4); }
        .lifting { background: linear-gradient(135deg, #1e1e3a, #e94560); box-shadow: 0 4px 20px rgba(233,69,96,0.4); }
        .todo { background: linear-gradient(135deg, #2c7a4b, #1a5233); box-shadow: 0 4px 20px rgba(44,122,75,0.4); }
        .taxes { background: linear-gradient(135deg, #1a4b8c, #0d2d5e); box-shadow: 0 4px 20px rgba(26,75,140,0.4); }
    </style>
</head>
<body>
    <h1>Bland Family Apps</h1>
    <div class="apps">
        <a href="/packing/" class="app-card packing">
            <div class="icon">🧳</div>
            <div class="info">
                <div class="name">Family Packing</div>
                <div class="desc">Plan and track what to pack for trips</div>
            </div>
        </a>
        <a href="/lifting/" class="app-card lifting">
            <div class="icon">🏋️</div>
            <div class="info">
                <div class="name">Kenny's Lifting</div>
                <div class="desc">Track 5×5×5 workout progress</div>
            </div>
        </a>
        <a href="/todo/" class="app-card todo">
            <div class="icon">📋</div>
            <div class="info">
                <div class="name">To-Do Lists</div>
                <div class="desc">Breakfast, Drive In, Lunch, Drive Out, Dinner</div>
            </div>
        </a>
        <a href="/taxes/" class="app-card taxes">
            <div class="icon">🧾</div>
            <div class="info">
                <div class="name">Taxes To-Do</div>
                <div class="desc">Track and notes tax prep tasks</div>
            </div>
        </a>
    </div>
</body>
</html>
