<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add Tax Item</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 0 auto; padding: 16px; background: #f0f4f8; }
        h1 { color: #1a4b8c; }
        .nav a { background: #dce8fa; color: #1a4b8c; padding: 10px 16px; border-radius: 8px; text-decoration: none; font-size: 15px; }
        .card { background: white; border-radius: 14px; padding: 20px; margin: 16px 0; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 16px; }
        label:first-child { margin-top: 0; }
        input[type=text], select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; background: #fafafa; }
        button[type=submit] { background: #1a4b8c; color: white; border: none; padding: 14px 20px; border-radius: 8px; font-size: 16px; width: 100%; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="nav"><a href="{{ url_for('taxes.index') }}">← Back</a></div>
    <h1>➕ Add Tax Item</h1>

    <div class="card">
        <form method="POST">
            <label>Item</label>
            <input type="text" name="label" placeholder="What needs to be done?" required autofocus>

            <label>Added by</label>
            <select name="added_by" required>
                {% for person in people %}
                <option value="{{ person }}">{{ person }}</option>
                {% endfor %}
            </select>

            <button type="submit">Add Item</button>
        </form>
    </div>
</body>
</html>
